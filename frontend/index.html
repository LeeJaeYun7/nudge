<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV Charging Coupon Nudge Simulator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #08080c;
  --surface: #111118;
  --surface2: #1a1a24;
  --surface3: #222230;
  --border: rgba(255,255,255,0.06);
  --text: #e8e8ec;
  --text2: #8888a0;
  --text3: #4a4a5c;
  --blue: #4e8cff;
  --green: #2dd4a0;
  --orange: #ffaa40;
  --red: #ff5a5a;
  --purple: #9580ff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',-apple-system,sans-serif; background:var(--bg); color:var(--text); }

.app { display:grid; grid-template-rows:auto 1fr; height:100vh; overflow:hidden; }

.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 24px; background:var(--surface); border-bottom:1px solid var(--border);
}
.topbar h1 { font-size:16px; font-weight:600; }
.topbar h1 span { color:var(--green); }
.controls { display:flex; gap:8px; align-items:center; }
.controls input { width:60px; padding:6px 8px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); text-align:center; font-size:13px; }
.controls label { font-size:12px; color:var(--text2); }
.btn { padding:8px 16px; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; }
.btn-primary { background:var(--green); color:#000; }
.btn-primary:hover { filter:brightness(1.1); }
.btn-danger { background:var(--red); color:#fff; }
.btn:disabled { opacity:.4; cursor:not-allowed; }

.main { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:16px; overflow-y:auto; }

.card {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:16px; display:flex; flex-direction:column; gap:12px;
}
.card h2 { font-size:14px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }

/* Baseline */
.baseline-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
}
.stat-box {
  background:var(--surface2); border-radius:8px; padding:12px; text-align:center;
}
.stat-box .value { font-size:22px; font-weight:700; color:var(--green); }
.stat-box .label { font-size:11px; color:var(--text2); margin-top:4px; }

/* Heatmap */
.heatmap-table {
  width:100%; border-collapse:collapse; font-size:12px;
}
.heatmap-table th { padding:6px 4px; color:var(--text2); font-weight:500; text-align:center; }
.heatmap-table td { padding:6px 4px; text-align:center; border-radius:4px; font-weight:600; }

/* Strategy table */
.strategy-table {
  width:100%; border-collapse:collapse; font-size:12px;
}
.strategy-table th { padding:6px 8px; color:var(--text2); font-weight:500; text-align:left; border-bottom:1px solid var(--border); }
.strategy-table td { padding:5px 8px; border-bottom:1px solid var(--border); }

/* Learnings */
.learnings { list-style:none; display:flex; flex-direction:column; gap:6px; max-height:280px; overflow-y:auto; }
.learnings li { font-size:12px; color:var(--text2); padding:6px 10px; background:var(--surface2); border-radius:6px; line-height:1.4; }

/* Progress */
.progress-bar { width:100%; height:6px; background:var(--surface3); border-radius:3px; overflow:hidden; }
.progress-bar .fill { height:100%; background:var(--green); transition:width .3s; border-radius:3px; }

.status-msg { font-size:12px; color:var(--text2); text-align:center; padding:8px; }

/* Full width cards */
.full-width { grid-column: 1 / -1; }

/* Iteration tabs */
.iter-tabs { display:flex; gap:4px; flex-wrap:wrap; }
.iter-tab {
  padding:4px 10px; font-size:11px; font-weight:600; border:1px solid var(--border);
  border-radius:6px; background:var(--surface2); color:var(--text2); cursor:pointer; transition:all .15s;
}
.iter-tab:hover { border-color:var(--blue); color:var(--text); }
.iter-tab.active { background:var(--blue); color:#fff; border-color:var(--blue); }
.iter-tab.tab-all { background:var(--surface3); }
.iter-tab.tab-all.active { background:var(--green); color:#000; border-color:var(--green); }

/* Chart */
.chart-wrap { position:relative; height:280px; }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <h1>⚡ EV Charging <span>Coupon Nudge</span> Simulator</h1>
    <div class="iter-tabs" id="loopTabs" style="margin-left:16px"></div>
    <div class="controls">
      <label>Iterations</label>
      <input type="number" id="iterInput" value="3" min="1" max="10">
      <label>Personas</label>
      <input type="number" id="personaInput" value="2000" min="100" max="10000" step="100">
      <button class="btn btn-primary" id="startBtn" onclick="startLoop()">▶ 시작</button>
      <button class="btn btn-danger" id="stopBtn" onclick="stopLoop()" disabled>■ 중지</button>
    </div>
  </div>

  <div class="main">

    <!-- 기준선 매출 -->
    <div class="card" id="baselineCard">
      <h2>📊 기준선 (쿠폰 없음)</h2>
      <div class="baseline-grid">
        <div class="stat-box"><div class="value" id="blUsers">—</div><div class="label">페르소나 인원</div></div>
        <div class="stat-box"><div class="value" id="blRevenue">—</div><div class="label">페르소나 기준 월매출</div></div>
        <div class="stat-box"><div class="value" id="blChange">—</div><div class="label">최신 변화율</div></div>
      </div>
      <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
      <div class="status-msg" id="statusMsg">시작 버튼을 눌러주세요</div>
    </div>

    <!-- 매출 타임라인 차트 -->
    <div class="card">
      <h2>📈 쿠폰 순이익 추이 (회차별)</h2>
      <div class="chart-wrap"><canvas id="revenueChart"></canvas></div>
    </div>

    <!-- 유형별 쿠폰 사용률 히트맵 -->
    <div class="card">
      <h2>🔥 유형별 쿠폰 사용률</h2>
      <div class="iter-tabs" id="heatmapTabs"></div>
      <table class="heatmap-table" id="heatmapTable">
        <thead>
          <tr><th></th><th>월1회미만</th><th>월1~2회</th><th>월3~4회</th><th>월5~9회</th><th>월10회+</th></tr>
        </thead>
        <tbody id="heatmapBody">
          <tr><td>20대</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td></tr>
          <tr><td>30대</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td></tr>
          <tr><td>40대</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td></tr>
          <tr><td>50대</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td></tr>
          <tr><td>60대+</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td></tr>
        </tbody>
      </table>
    </div>

    <!-- 전략 조건 테이블 -->
    <div class="card">
      <h2>🎯 현재 전략 조건</h2>
      <div class="iter-tabs" id="strategyTabs"></div>
      <div style="max-height:280px;overflow-y:auto">
        <table class="strategy-table" id="strategyTable">
          <thead><tr><th>유형</th><th>할인율</th><th>유효기간</th><th>사용률</th><th>순이익</th></tr></thead>
          <tbody id="strategyBody"><tr><td colspan="5" class="status-msg">대기 중</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- 사용률 차트 -->
    <div class="card">
      <h2>📉 쿠폰 사용률 추이</h2>
      <div class="iter-tabs" id="usageTabs"></div>
      <div class="chart-wrap"><canvas id="usageChart"></canvas></div>
    </div>

    <!-- 학습 패널 -->
    <div class="card">
      <h2>🧠 누적 학습 인사이트</h2>
      <div class="iter-tabs" id="learningTabs"></div>
      <ul class="learnings" id="learningsList">
        <li class="status-msg">학습 대기 중</li>
      </ul>
    </div>

  </div>
</div>

<script>
const API = '';
const ages = ['20대','30대','40대','50대','60대+'];
const freqs = ['월1회미만','월1~2회','월3~4회','월5~9회','월10회+'];

let revenueChart, usageChart;
let baselineRevenue = 0;

// 루프별 데이터 저장소
let loopRuns = {};        // {runId: {learnings, strategies, heatmaps, usage, allLearnings, baseline, personaCount}}
let activeRunId = null;   // 현재 보고 있는 루프
let currentRunId = null;  // 현재 실행 중/마지막 루프

function getRunData(runId) {
  if (!loopRuns[runId]) {
    loopRuns[runId] = {
      allLearnings: [],
      learnings: {},      // {iteration: [learnings]}
      strategies: {},     // {iteration: {conditions, per_type_results, ...}}
      heatmaps: {},       // {iteration: {type_key: usage_rate}}
      usage: {},          // {iteration: coupon_usage_rate}
      revenue: {},        // {iteration: net_revenue}
      baseline: 0,
      personaCount: 0,
    };
  }
  return loopRuns[runId];
}

// 현재 활성 루프 데이터
function activeData() { return getRunData(activeRunId); }

// === Charts ===
function initCharts() {
  const opts = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { labels: { color:'#8888a0', font:{size:11} } } },
    scales: {
      x: { ticks:{color:'#8888a0'}, grid:{color:'rgba(255,255,255,0.04)'} },
      y: { ticks:{color:'#8888a0'}, grid:{color:'rgba(255,255,255,0.04)'} }
    }
  };

  revenueChart = new Chart(document.getElementById('revenueChart'), {
    type: 'bar',
    data: {
      labels: [],
      datasets: [
        { label:'쿠폰 순이익', data:[], backgroundColor:'rgba(45,212,160,0.7)', borderRadius:4 }
      ]
    },
    options: {
      ...opts,
      plugins: {
        ...opts.plugins,
        annotation: revenueChart ? undefined : undefined, // baseline line added dynamically
      },
      scales: {
        ...opts.scales,
        y:{...opts.scales.y, ticks:{...opts.scales.y.ticks, callback:v=>'₩'+(v/10000).toFixed(0)+'만'}, beginAtZero:true }
      }
    }
  });

  usageChart = new Chart(document.getElementById('usageChart'), {
    type: 'line',
    data: {
      labels: [],
      datasets: [{ label:'쿠폰 사용률', data:[], borderColor:'#2dd4a0', backgroundColor:'rgba(45,212,160,0.1)', fill:true, tension:0.3, pointRadius:5 }]
    },
    options: { ...opts, scales: { ...opts.scales, y:{...opts.scales.y, ticks:{...opts.scales.y.ticks, callback:v=>(v*100).toFixed(0)+'%'}, min:0, max:1} } }
  });
}

// === API ===

async function startLoop() {
  const n = parseInt(document.getElementById('iterInput').value);
  const p = parseInt(document.getElementById('personaInput').value);
  document.getElementById('startBtn').disabled = true;
  document.getElementById('stopBtn').disabled = false;

  // 차트 초기화
  revenueChart.data.labels = [];
  revenueChart.data.datasets[0].data = [];
  revenueChart.update();
  usageChart.data.labels = [];
  usageChart.data.datasets[0].data = [];
  usageChart.update();

  await fetch(API+'/api/loop/start', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({n_iterations:n, personas_count:p})
  });

  const evtSource = new EventSource(API+'/api/loop/stream');
  evtSource.onmessage = (e) => {
    const d = JSON.parse(e.data);
    handleEvent(d);
    if (d.type === 'done') {
      evtSource.close();
      document.getElementById('startBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
      document.getElementById('statusMsg').textContent = 'RALPH Loop 완료';
      document.getElementById('progressFill').style.width = '100%';
    }
  };
}

async function stopLoop() {
  await fetch(API+'/api/loop/stop', {method:'POST'});
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
}

function handleEvent(d) {
  const runId = d.run_id;

  switch(d.type) {
    case 'status':
      document.getElementById('statusMsg').textContent = d.message;
      break;

    case 'personas_loaded':
      currentRunId = runId;
      activeRunId = runId;
      getRunData(runId).personaCount = d.count;
      document.getElementById('blUsers').textContent = d.count.toLocaleString()+'명';
      document.getElementById('statusMsg').textContent = `페르소나 ${d.count}명 생성 완료`;
      renderLoopTabs();
      break;

    case 'baseline':
      baselineRevenue = d.monthly_revenue;
      getRunData(runId).baseline = d.monthly_revenue;
      document.getElementById('blRevenue').textContent = '₩'+(d.monthly_revenue/10000).toFixed(0)+'만';
      break;

    case 'iteration_start':
      document.getElementById('statusMsg').textContent = `이터레이션 ${d.iteration}/${d.total} 진행 중...`;
      document.getElementById('progressFill').style.width = ((d.iteration-1)/d.total*100)+'%';
      break;

    case 'iteration_end':
      // 현재 루프 데이터에 저장
      const rd = getRunData(runId);
      rd.revenue[d.iteration] = d.net_revenue;
      updateRevenue(d);
      updateUsage(d, runId);
      updateHeatmap(d, runId);
      updateStrategy(d, runId);
      updateLearnings(d, runId);
      const changePct = baselineRevenue > 0 ? (d.net_revenue/baselineRevenue*100).toFixed(1) : '0';
      document.getElementById('blChange').textContent = '+'+changePct+'%';
      document.getElementById('blChange').style.color = '#2dd4a0';
      document.getElementById('statusMsg').textContent = `이터레이션 ${d.iteration} 완료 — 순이익 ₩${(d.net_revenue/10000).toFixed(0)}만`;
      document.getElementById('progressFill').style.width = (d.iteration/document.getElementById('iterInput').value*100)+'%';
      break;
  }
}

// === 루프 탭 ===
function renderLoopTabs() {
  const ids = Object.keys(loopRuns).map(Number).sort((a,b)=>a-b);
  if (ids.length === 0) { document.getElementById('loopTabs').innerHTML = ''; return; }
  document.getElementById('loopTabs').innerHTML = ids.map(id =>
    `<span class="iter-tab${activeRunId===id?' active':''}" onclick="switchLoop(${id})">루프 #${id}</span>`
  ).join('');
}

function switchLoop(runId) {
  activeRunId = runId;
  const rd = getRunData(runId);
  baselineRevenue = rd.baseline;

  // 상단 stat 업데이트
  document.getElementById('blUsers').textContent = rd.personaCount.toLocaleString()+'명';
  document.getElementById('blRevenue').textContent = '₩'+(rd.baseline/10000).toFixed(0)+'만';
  const lastIter = Math.max(...Object.keys(rd.revenue).map(Number), 0);
  if (lastIter > 0) {
    const changePct = rd.baseline > 0 ? (rd.revenue[lastIter]/rd.baseline*100).toFixed(1) : '0';
    document.getElementById('blChange').textContent = '+'+changePct+'%';
  } else {
    document.getElementById('blChange').textContent = '—';
  }

  // 차트/테이블 전환
  renderLoopTabs();
  renderRevenueForRun(runId);
  renderUsageForRun(runId);
  renderHeatmapForRun(runId);
  renderStrategyForRun(runId);
  renderLearningsForRun(runId);
}

function renderRevenueForRun(runId) {
  const rd = getRunData(runId);
  const iters = Object.keys(rd.revenue).map(Number).sort((a,b)=>a-b);
  revenueChart.data.labels = iters.map(i => i+'회차');
  revenueChart.data.datasets[0].data = iters.map(i => rd.revenue[i]);
  revenueChart.update();
}

function renderUsageForRun(runId) {
  activeUsageTab = 'all';
  renderUsageTabs();
  renderUsageChart('all');
}

function renderHeatmapForRun(runId) {
  const rd = getRunData(runId);
  const iters = Object.keys(rd.heatmaps).map(Number).sort((a,b)=>a-b);
  if (iters.length > 0) {
    activeHeatmapTab = iters[iters.length - 1];
    renderHeatmapTabs();
    renderHeatmapTable(activeHeatmapTab);
  }
}

function renderStrategyForRun(runId) {
  const rd = getRunData(runId);
  const iters = Object.keys(rd.strategies).map(Number).sort((a,b)=>a-b);
  if (iters.length > 0) {
    activeStrategyTab = iters[iters.length - 1];
    renderStrategyTabs();
    renderStrategyTable(activeStrategyTab);
  }
}

function renderLearningsForRun(runId) {
  activeLearningTab = 'all';
  renderLearningTabs();
  renderLearningList('all');
}

function updateRevenue(d) {
  revenueChart.data.labels.push(d.iteration+'회차');
  revenueChart.data.datasets[0].data.push(d.net_revenue);
  revenueChart.update();
}

// === 쿠폰 사용률 추이 (회차별 탭) ===
let activeUsageTab = 'all';

function updateUsage(d, runId) {
  getRunData(runId).usage[d.iteration] = d.coupon_usage_rate;
  activeUsageTab = 'all';
  renderUsageTabs();
  renderUsageChart('all');
}

function renderUsageTabs() {
  const container = document.getElementById('usageTabs');
  const rd = activeData();
  const iters = Object.keys(rd.usage).map(Number).sort((a,b)=>a-b);
  let html = `<span class="iter-tab tab-all${activeUsageTab==='all'?' active':''}" onclick="showUsageIter('all')">전체</span>`;
  html += iters.map(i =>
    `<span class="iter-tab${activeUsageTab===i?' active':''}" onclick="showUsageIter(${i})">${i}회차 (${(rd.usage[i]*100).toFixed(0)}%)</span>`
  ).join('');
  container.innerHTML = html;
}

function showUsageIter(iter) {
  activeUsageTab = iter;
  renderUsageTabs();
  renderUsageChart(iter);
}

function renderUsageChart(iter) {
  const rd = activeData();
  if (iter === 'all') {
    const iters = Object.keys(rd.usage).map(Number).sort((a,b)=>a-b);
    usageChart.data.labels = iters.map(i => i+'회차');
    usageChart.data.datasets[0].data = iters.map(i => rd.usage[i]);
  } else {
    usageChart.data.labels = [iter+'회차'];
    usageChart.data.datasets[0].data = [rd.usage[iter]];
  }
  usageChart.update();
}

// === 유형별 쿠폰 사용률 히트맵 (회차별 탭) ===
let activeHeatmapTab = null;

function updateHeatmap(d, runId) {
  const rateMap = {};
  (d.per_type_results||[]).forEach(t => { rateMap[t.type_key] = t.usage_rate; });
  getRunData(runId).heatmaps[d.iteration] = rateMap;
  activeHeatmapTab = d.iteration;
  renderHeatmapTabs();
  renderHeatmapTable(d.iteration);
}

function renderHeatmapTabs() {
  const container = document.getElementById('heatmapTabs');
  const rd = activeData();
  const iters = Object.keys(rd.heatmaps).map(Number).sort((a,b)=>a-b);
  container.innerHTML = iters.map(i =>
    `<span class="iter-tab${activeHeatmapTab===i?' active':''}" onclick="showHeatmapIter(${i})">${i}회차</span>`
  ).join('');
}

function showHeatmapIter(iter) {
  activeHeatmapTab = iter;
  renderHeatmapTabs();
  renderHeatmapTable(iter);
}

function renderHeatmapTable(iter) {
  const rd = activeData();
  const rateMap = rd.heatmaps[iter] || {};
  const tbody = document.getElementById('heatmapBody');
  tbody.innerHTML = '';
  ages.forEach(age => {
    let row = `<td style="color:var(--text2);font-weight:500">${age}</td>`;
    freqs.forEach(freq => {
      const key = age+'_'+freq;
      const rate = rateMap[key];
      if (rate !== undefined) {
        const pct = (rate*100).toFixed(0);
        const hue = Math.min(rate*300, 120);
        const bg = `hsla(${hue},70%,40%,0.3)`;
        row += `<td style="background:${bg}">${pct}%</td>`;
      } else {
        row += `<td>—</td>`;
      }
    });
    tbody.innerHTML += `<tr>${row}</tr>`;
  });
}

let activeStrategyTab = null;

function updateStrategy(d, runId) {
  getRunData(runId).strategies[d.iteration] = {
    conditions: d.conditions || [],
    per_type_results: d.per_type_results || [],
    coupon_usage_rate: d.coupon_usage_rate,
    net_revenue: d.net_revenue
  };
  activeStrategyTab = d.iteration;
  renderStrategyTabs();
  renderStrategyTable(d.iteration);
}

function renderStrategyTabs() {
  const container = document.getElementById('strategyTabs');
  const rd = activeData();
  const iters = Object.keys(rd.strategies).map(Number).sort((a,b)=>a-b);
  container.innerHTML = iters.map(i =>
    `<span class="iter-tab${activeStrategyTab===i?' active':''}" onclick="showStrategyIter(${i})">${i}회차</span>`
  ).join('');
}

function showStrategyIter(iter) {
  activeStrategyTab = iter;
  renderStrategyTabs();
  renderStrategyTable(iter);
}

function renderStrategyTable(iter) {
  const rd = activeData();
  const data = rd.strategies[iter];
  if (!data) return;
  const tbody = document.getElementById('strategyBody');
  const rateMap = {};
  const netMap = {};
  data.per_type_results.forEach(t => { rateMap[t.type_key]=t.usage_rate; netMap[t.type_key]=t.net_revenue; });

  let html = '';
  data.conditions.forEach(c => {
    const rate = rateMap[c.type_key];
    const net = netMap[c.type_key];
    const rateStr = rate !== undefined ? (rate*100).toFixed(0)+'%' : '—';
    const netStr = net !== undefined ? '₩'+(net/10000).toFixed(1)+'만' : '—';
    html += `<tr><td>${c.type_key}</td><td>${(c.discount_rate*100).toFixed(0)}%</td><td>${c.validity_days}일</td><td>${rateStr}</td><td>${netStr}</td></tr>`;
  });

  if (!html && data.conditions.length === 1) {
    const c = data.conditions[0];
    html = `<tr><td>전체 동일</td><td>${(c.discount_rate*100).toFixed(0)}%</td><td>${c.validity_days}일</td><td>${(data.coupon_usage_rate*100).toFixed(0)}%</td><td>₩${(data.net_revenue/10000).toFixed(1)}만</td></tr>`;
  }

  tbody.innerHTML = html || '<tr><td colspan="5">데이터 없음</td></tr>';
}

let activeLearningTab = 'all';

function updateLearnings(d, runId) {
  const rd = getRunData(runId);
  const learnings = (d.learnings && d.learnings.length > 0) ? d.learnings : [];
  rd.learnings[d.iteration] = learnings;
  if (learnings.length > 0) rd.allLearnings.push(...learnings);
  activeLearningTab = d.iteration;
  renderLearningTabs();
  renderLearningList(d.iteration);
}

function renderLearningTabs() {
  const container = document.getElementById('learningTabs');
  const rd = activeData();
  const iters = Object.keys(rd.learnings).map(Number).sort((a,b)=>a-b);
  let html = `<span class="iter-tab tab-all${activeLearningTab==='all'?' active':''}" onclick="showLearningIter('all')">전체</span>`;
  html += iters.map(i =>
    `<span class="iter-tab${activeLearningTab===i?' active':''}" onclick="showLearningIter(${i})">${i}회차</span>`
  ).join('');
  container.innerHTML = html;
}

function showLearningIter(iter) {
  activeLearningTab = iter;
  renderLearningTabs();
  renderLearningList(iter);
}

function renderLearningList(iter) {
  const rd = activeData();
  const ul = document.getElementById('learningsList');
  ul.innerHTML = '';
  if (iter === 'all') {
    let idx = 1;
    const iters = Object.keys(rd.learnings).map(Number).sort((a,b)=>a-b);
    iters.forEach(i => {
      ul.innerHTML += `<li style="background:transparent;color:var(--blue);font-weight:600;padding:4px 10px;">── ${i}회차 ──</li>`;
      rd.learnings[i].forEach(l => {
        ul.innerHTML += `<li><strong>${idx++}.</strong> ${l}</li>`;
      });
    });
  } else {
    const learnings = rd.learnings[iter] || [];
    if (learnings.length === 0) {
      ul.innerHTML = '<li class="status-msg">이 회차에서는 학습 추출 실패 (LLM 에러)</li>';
      return;
    }
    learnings.forEach((l,i) => {
      ul.innerHTML += `<li><strong>${i+1}.</strong> ${l}</li>`;
    });
  }
  ul.scrollTop = ul.scrollHeight;
}

// === 히스토리 로드 ===
async function loadHistory() {
  try {
    const res = await fetch(API+'/api/loop/history');
    const runs = await res.json();
    if (!runs.length) return;

    runs.forEach(run => {
      const rd = getRunData(run.run_id);
      rd.baseline = run.baseline_revenue;
      rd.personaCount = run.personas_count;
      run.iterations.forEach(it => {
        rd.revenue[it.iteration] = it.net_revenue;
        rd.usage[it.iteration] = it.coupon_usage_rate;
        rd.strategies[it.iteration] = {
          conditions: it.conditions,
          per_type_results: it.per_type_results,
          coupon_usage_rate: it.coupon_usage_rate,
          net_revenue: it.net_revenue,
        };
        const rateMap = {};
        (it.per_type_results||[]).forEach(t => { rateMap[t.type_key] = t.usage_rate; });
        rd.heatmaps[it.iteration] = rateMap;
        if (it.learnings && it.learnings.length) {
          rd.learnings[it.iteration] = it.learnings;
          rd.allLearnings.push(...it.learnings);
        }
      });
    });

    // 마지막 루프를 활성화
    const lastRun = runs[runs.length - 1];
    activeRunId = lastRun.run_id;
    currentRunId = lastRun.run_id;
    switchLoop(activeRunId);
  } catch(e) { /* 히스토리 없으면 무시 */ }
}

// === Init ===
initCharts();
loadHistory();
</script>
